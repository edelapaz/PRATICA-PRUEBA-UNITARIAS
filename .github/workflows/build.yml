name: .NET CI con SonarCloud

on:
  push:
    branches: ["main", "dev_edelapaz"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    env:
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORG: ${{ secrets.SONAR_ORG }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Instalar SonarScanner
        run: |
          dotnet tool update --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Validar variables de SonarCloud
        run: |
          if [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "Falta SONAR_PROJECT_KEY en los secrets del repositorio."
            exit 1
          fi

          if [ -z "$SONAR_ORG" ]; then
            echo "Falta SONAR_ORG en los secrets del repositorio."
            exit 1
          fi

          if [ -z "$SONAR_TOKEN" ]; then
            echo "Falta SONAR_TOKEN en los secrets del repositorio."
            exit 1
          fi

      - name: Iniciar análisis SonarCloud
        run: |
          dotnet sonarscanner begin \
          /k:"$SONAR_PROJECT_KEY" \
          /o:"$SONAR_ORG" \
          /d:sonar.token="$SONAR_TOKEN" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.qualitygate.wait=true \
          /d:sonar.verbose=true \
          /d:sonar.cs.opencover.reportsPaths="./TestResults/coverage.opencover.xml" \
          /d:sonar.cs.vstest.reportsPaths="./TestResults/test-results.trx"

      - name: Restaurar dependencias
        run: dotnet restore ./PruebasUnitarias.slnx

      - name: Compilar solución
        run: dotnet build ./PruebasUnitarias.slnx -c Release --no-restore

      - name: Ejecutar pruebas y generar cobertura
        run: |
          dotnet test ./PruebasUnitarias.slnx -c Release --no-build \
          --logger "trx;LogFileName=test-results.trx" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Verificar reporte de cobertura
        run: |
          echo "Archivos de resultados encontrados:"
          find ./TestResults -type f \( -name "coverage.opencover.xml" -o -name "*.trx" \) -print

          COVERAGE_FILE=$(find ./TestResults -type f -name "coverage.opencover.xml" | head -n 1)
          if [ -z "$COVERAGE_FILE" ]; then
            echo "No se encontró coverage.opencover.xml."
            exit 1
          fi
          echo "Reporte de cobertura detectado en: $COVERAGE_FILE"
          cp "$COVERAGE_FILE" ./TestResults/coverage.opencover.xml

          TRX_FILE=$(find ./TestResults -type f -name "*.trx" | head -n 1)
          if [ -n "$TRX_FILE" ]; then
            cp "$TRX_FILE" ./TestResults/test-results.trx
            echo "Reporte TRX detectado en: $TRX_FILE"
          else
            echo "No se encontró archivo TRX."
          fi

      - name: Finalizar análisis SonarCloud
        run: |
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: |
            TestResults/**/coverage.opencover.xml
            TestResults/**/*.trx
          if-no-files-found: warn
